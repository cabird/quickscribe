cache:
  connection_string: null
  container_name: null
  encoding: utf-8
  path: output/cache
  storage_account_blob_url: null
  type: file
debug:
  generate_astred_digest: false
  verbose: false
indexing:
  community_reports_max_level: 2
  generate_community_reports: true
  generate_sequence_diagrams: false
  generate_signatures: false
  generate_tags: false
  handled_block_types:
  - function
  - class
  - generic
  - enum
  - macro
  - struct
  - typedef
  - file
  ignored_block_types:
  - namespace
  - import
  - preprocessor
  - error
  path: output/index
  structured_summaries: false
  summarize_class_members: false
  summarize_global_variables: false
input:
  exclude: ["node_modules/**/*", "venv/**/*" ]
  parquet_columns:
    block_type: Blocktype
    body: Body
    child_ids: ChildIds
    file: File
    id: Id
    name: Name
    parent_id: ParentId
    related_block_ids_by_relation_type: RelatedBlockIdsByRelationType
  path: /home/cbird/repos/quickscribe
  patterns:
  - '**/*.tsx'
  - '**/*.ts'

openai:
  api_base: null
  api_key: null
  api_version: null
  azure: true
  deployment_name: null
  model: gpt-4o
  rpm: 900
  tpm: 150000
