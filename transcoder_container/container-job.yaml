# container-job.yaml - Azure Container Jobs configuration
location: westus2
resourceGroup: QuickScribeResourceGroup
containerJobName: quickscribetranscoderjobs
properties:
  configuration:
    secrets:
      - name: "azure-storage-connection"
        value: "YOUR_AZURE_STORAGE_CONNECTION_STRING"
    triggerType: "Event"
    eventTriggerConfig:
      parallelism: 1
      replicaCompletionCount: 1
      scale:
        minExecutions: 0
        maxExecutions: 1
        pollingInterval: 30
        rules:
          - name: "queue-scale"
            type: "azure-queue"
            metadata:
              queueName: "transcoding-queue"
              queueLength: "1"
              accountName: "quickscribestorage"
            auth:
              - triggerParameter: "connection"
                secretRef: "azure-storage-connection"
    replicaRetryLimit: 2
    replicaTimeout: 300
  template:
    containers:
      - name: transcoder
        image: quickscribecontainerregistry.azurecr.io/transcoder-container:latest
        env:
          # Storage connection string for queue and blob access
          - name: AZURE_STORAGE_CONNECTION_STRING
            secretRef: azure-storage-connection
          # Queue name for transcoding jobs
          - name: TRANSCODING_QUEUE_NAME
            value: "transcoding-queue"
          # Log level for the container
          - name: LOG_LEVEL
            value: "INFO"
          # Container version
          - name: CONTAINER_VERSION
            value: "0.1.30"
        resources:
          cpu: 1.0      # CPU for FFmpeg processing
          memory: 2.0Gi # Memory for audio processing